<style>
  .cover-gradient {
    min-height: 10in;
    background: linear-gradient(145deg, #1a1d1e 0%, #25282A 60%, #2EA84A 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 72px 64px;
    page-break-after: always;
    position: relative;
    overflow: hidden;
  }
  .cover-gradient::after {
    content: '';
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 340px;
    height: 340px;
    background-image: url('{{{logoDataUri}}}');
    background-size: cover;
    background-repeat: no-repeat;
    opacity: 0.09;
    -webkit-mask-image: radial-gradient(circle at center, black 35%, transparent 68%);
    mask-image: radial-gradient(circle at center, black 35%, transparent 68%);
  }
  .cover-gradient .cover-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #2EA84A, #7DE69B, #59BEC9);
  }
  .cover-gradient .cover-logo {
    margin-bottom: 20px;
  }
  .cover-gradient .cover-logo img {
    filter: drop-shadow(0 0 12px rgba(46, 168, 74, 0.7));
  }
  .cover-gradient h1 {
    font-family: 'Poppins', 'DM Sans', Arial, sans-serif;
    color: #fff;
    font-size: 52px;
    font-weight: 700;
    line-height: 1.05;
    margin: 0 0 16px;
    letter-spacing: 0.02em;
    max-width: 90%;
  }
  .cover-gradient .thin-rule {
    width: 80px;
    height: 2px;
    background: #7DE69B;
    margin: 16px 0;
  }
  .cover-gradient .subtitle {
    color: #7DE69B;
    font-size: 20px;
    font-weight: 400;
    margin: 0 0 8px;
    font-style: italic;
  }
  .cover-gradient .meta {
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    margin: 4px 0 0;
  }
  @media print { .cover-gradient { min-height: 100vh; } }
</style>
<div class="cover-gradient">
  <div class="cover-bar"></div>
  <div class="cover-logo">{{{logoHorizWhiteLg}}}</div>
  <h1>{{title}}</h1>
  <div class="thin-rule"></div>
  {{#if subtitle}}<p class="subtitle">{{subtitle}}</p>{{/if}}
  <p class="meta">{{date}} {{#if confidentiality}}· {{confidentiality}}{{/if}}</p>
</div>
